# This is an example .goreleaser.yml file with some sensible defaults.
# Make sure to check the documentation at https://goreleaser.com

# The lines below are called `modelines`. See `:help modeline`
# Feel free to remove those if you don't want/need to use them.
# yaml-language-server: $schema=https://goreleaser.com/static/schema.json
# vim: set ts=2 sw=2 tw=0 fo=cnqoj

version: 2

project_name: awssso

before:
  hooks:
    - go mod tidy
    - ./scripts/completions.sh

builds:
  - id: awssso
    binary: awssso
    env:
      - CGO_ENABLED=0
    mod_timestamp: "{{ .CommitTimestamp }}"
    goos:
      - darwin
      - linux
      - windows
    goarch:
      - amd64
      - arm64
    tags:
      - nodev
    flags:
      - -trimpath
    ldflags:
      - "-s -w"
      - -X main.buildVersion={{.Version}}
      - -X main.buildSha={{.Commit}}

gomod:
  proxy: true

archives:
  - id: homebrew
    formats:
      - tar.gz
    name_template: >-
      {{ .ProjectName }}_
      {{- title .Os }}_
      {{- if eq .Arch "amd64" }}x86_64
      {{- else if eq .Arch "386" }}i386
      {{- else }}{{ .Arch }}{{ end }}
      {{- if .Arm }}v{{ .Arm }}{{ end }}
    # use zip for windows archives
    format_overrides:
      - goos: windows
        formats: ["zip"]
    files:
      - completions/*

homebrew_casks:
  - ids:
      - homebrew
    name: awssso
    repository:
      owner: webdestroya
      name: homebrew-tap
      branch: main
      token: "{{ .Env.HOMEBREW_SCOOP_GITHUB_TOKEN }}"
    homepage: https://github.com/webdestroya/aws-sso
    url:
      template: "https://github.com/webdestroya/aws-sso/releases/download/{{ .Tag }}/{{ .ArtifactName }}"
    description: "Writes credentials for AWS SSO'd accounts so that older applications can use them."
    skip_upload: auto
    license: "MIT"
    binaries:
      - awssso
    commit_author:
      name: cloud87bot
      email: 114977785+cloud87bot@users.noreply.github.com
    hooks:
      post:
        install: |
          system_command "/usr/bin/xattr", args: ["-dr", "com.apple.quarantine", "#{staged_path}/groundskeeper"]


scoops:
  - repository:
      owner: webdestroya
      name: scoop-bucket
      token: "{{ .Env.HOMEBREW_SCOOP_GITHUB_TOKEN }}"
      branch: main
    url_template: "https://github.com/webdestroya/aws-sso/releases/download/{{ .Tag }}/{{ .ArtifactName }}"
    commit_author:
      name: cloud87bot
      email: 114977785+cloud87bot@users.noreply.github.com
    homepage: https://github.com/webdestroya/aws-sso
    description: "Writes credentials for AWS SSO'd accounts so that older applications can use them."
    license: MIT

nfpms:
  - id: nfpm-default
    package_name: awssso
    file_name_template: "{{ .ProjectName }}_{{ .Version }}_{{ .Os }}_{{ .Arch }}"
    vendor: Mitch Dempsey
    homepage: https://github.com/webdestroya/aws-sso
    maintainer: Mitch Dempsey <webdestroya@users.noreply.github.com>
    description: "Writes credentials for AWS SSO'd accounts so that older applications can use them."
    license: MIT
    section: utils
    priority: extra
    formats:
      - deb
      - rpm
      - apk
    contents:
      - src: "./completions/awssso.bash"
        dst: "/usr/share/bash-completion/completions/awssso"
      - src: "./completions/awssso.fish"
        dst: "/usr/share/fish/vendor_completions.d/awssso.fish"
      - src: "./completions/awssso.zsh"
        dst: "/usr/share/zsh/site-functions/_awssso"

universal_binaries:
  - id: awssso
    name_template: "{{ .ProjectName }}"
    replace: false

checksum:
  name_template: "checksums.txt"

source:
  enabled: true

sboms:
  - artifacts: archive
  - id: source # Two different sbom configurations need two different IDs
    artifacts: source

signs:
  - cmd: cosign
    args:
      - sign-blob
      - "--bundle=${signature}"
      - "${artifact}"
      - "--yes"
    artifacts: checksum
    output: true

changelog:
  sort: asc
  filters:
    exclude:
      - "^docs:"
      - "^test:"

dockers_v2:
  - images:
      - "ghcr.io/webdestroya/aws-sso"
    tags:
      - "v{{ .Version }}"
      - latest
    labels:
      "org.opencontainers.image.created": "{{.Date}}"
      "org.opencontainers.image.name": "{{.ProjectName}}"
      "org.opencontainers.image.revision": "{{.FullCommit}}"
      "org.opencontainers.image.version": "{{.Version}}"
      "org.opencontainers.image.source": "{{.GitURL}}"

docker_signs:
  - cmd: cosign
    output: true
    args:
      - "sign"
      - "${artifact}@${digest}"
      - "--yes"